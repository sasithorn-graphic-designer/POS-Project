  <script>
    // 1. SolidJS Reactivity Setup with Fallback Engine
    let activeEffect = null;
    const solidObj = window.solid || window.Solid || {};

    const createSignal = solidObj.createSignal || function(initial) {
      let val = initial;
      const subs = new Set();
      const getter = () => { if (activeEffect) subs.add(activeEffect); return val; };
      const setter = (next) => {
        val = typeof next === 'function' ? next(val) : next;
        subs.forEach(fn => fn());
      };
      return [getter, setter];
    };

    const createEffect = solidObj.createEffect || function(fn) {
      const execute = () => {
        activeEffect = execute;
        try { fn(); } finally { activeEffect = null; }
      };
      execute();
    };

    const createMemo = solidObj.createMemo || function(fn) {
      const [s, setS] = createSignal(fn());
      createEffect(() => setS(fn()));
      return s;
    };

    // 2. High-Performance Reactive DOM Builder for SolidJS & HTM
    function h(tag, props, ...children) {
      if (typeof tag === 'function') return tag(props, children);
      const el = document.createElement(tag);
      
      if (props) {
        for (let key in props) {
          if (key.startsWith('on') && typeof props[key] === 'function') {
            const eventName = key.substring(2).toLowerCase();
            el.addEventListener(eventName, props[key]);
          } else if (key === 'className' || key === 'class') {
            if (typeof props[key] === 'function') {
              createEffect(() => { el.className = props[key]() || ''; });
            } else {
              el.className = props[key];
            }
          } else if (key === 'style') {
            if (typeof props[key] === 'function') {
              createEffect(() => {
                const st = props[key]();
                if (typeof st === 'object') Object.assign(el.style, st);
                else el.style.cssText = String(st || '');
              });
            } else if (typeof props[key] === 'object') {
              Object.assign(el.style, props[key]);
            } else {
              el.style.cssText = String(props[key]);
            }
          } else if (typeof props[key] === 'function') {
            createEffect(() => {
              const val = props[key]();
              if (key === 'value') {
                el.value = val !== undefined && val !== null ? val : '';
              } else if (key === 'disabled') {
                if (val) el.setAttribute('disabled', 'true');
                else el.removeAttribute('disabled');
              } else if (val === false || val === null || val === undefined) {
                el.removeAttribute(key);
              } else {
                el.setAttribute(key, String(val));
              }
            });
          } else if (key === 'disabled') {
            if (props[key]) el.setAttribute('disabled', 'true');
            else el.removeAttribute('disabled');
          } else {
            el.setAttribute(key, String(props[key]));
          }
        }
      }

      const appendChildNode = (parent, child) => {
        if (child === null || child === undefined || child === false) return;
        
        if (Array.isArray(child)) {
          child.forEach(c => appendChildNode(parent, c));
        } else if (typeof child === 'function') {
          const marker = document.createTextNode('');
          parent.appendChild(marker);
          
          let currentNodes = [];
          createEffect(() => {
            const val = child();
            currentNodes.forEach(node => {
              if (node && node.parentNode) node.parentNode.removeChild(node);
            });
            currentNodes = [];

            if (val === null || val === undefined || val === false) return;

            if (Array.isArray(val)) {
              val.forEach(item => {
                if (item instanceof Node) {
                  marker.parentNode.insertBefore(item, marker);
                  currentNodes.push(item);
                } else if (item !== null && item !== undefined && item !== false) {
                  const tn = document.createTextNode(String(item));
                  marker.parentNode.insertBefore(tn, marker);
                  currentNodes.push(tn);
                }
              });
            } else if (val instanceof Node) {
              marker.parentNode.insertBefore(val, marker);
              currentNodes.push(val);
            } else {
              const tn = document.createTextNode(String(val));
              marker.parentNode.insertBefore(tn, marker);
              currentNodes.push(tn);
            }
          });
        } else if (child instanceof Node) {
          parent.appendChild(child);
        } else {
          parent.appendChild(document.createTextNode(String(child)));
        }
      };

      children.forEach(child => appendChildNode(el, child));
      return el;
    }

    // 2.1 HTM Template Engine with Safe Fallback Parser (Prevents stuck loading if CDN is slow)
    let html;
    try {
      if (window.htm && typeof window.htm.bind === 'function') {
        html = window.htm.bind(h);
      } else {
        html = function(strings, ...values) {
          if (window.htm && typeof window.htm.bind === 'function') {
            return window.htm.bind(h)(strings, ...values);
          }
          return h('div', null, strings.reduce((res, str, i) => res + (values[i - 1] || '') + str));
        };
      }
    } catch(e) {
      html = h;
    }

    // 3. Audio Chimes Synthesizer
    function playAudioTone(type) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'add' || type === 'beep' || type === 'scan') {
          // Barcode Scanner Beep Sound: High frequency ~1800Hz, short duration ~0.08s
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1800, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.start();
          osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'pay') {
          osc.frequency.setValueAtTime(587.33, ctx.currentTime);
          osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
          osc.frequency.setValueAtTime(1174.66, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
          osc.start();
          osc.stop(ctx.currentTime + 0.5);
        } else if (type === 'click') {
          osc.frequency.setValueAtTime(450, ctx.currentTime);
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'error') {
          osc.frequency.setValueAtTime(250, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.25, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        }
      } catch (e) {}
    }

    // Product Name Formatting
    function formatProductName(fullName) {
      if (!fullName) return { mainName: '', sizeSpec: '' };
      const str = String(fullName).trim();
      const match = str.match(/(.+?)(\s+\d+(\.\d+)?\s*(ก\.|มล\.|มล|g|ml|กก\.|kg)?)$/i);
      if (match) {
        return { mainName: match[1].trim(), sizeSpec: match[2].trim() };
      }
      return { mainName: str, sizeSpec: '' };
    }

    const API_URL = 'https://script.google.com/macros/s/AKfycbwPlgoPJacGVdma4UKWparazPkjjlE-_7Un_QUe7x1aqZghXKcDAEi3W6zgklWv-YXYHA/exec';

      const searchQuery = () => searchQuerySignal();

      // Weight Calculation Modal State

      // Cart & Payment (Silom POS & Modal Flow)

      // Filtered Sales Records based on Selected Range
      const dashboardFilteredSales = createMemo(() => {
        const range = dateFilterRange();
        const now = Date.now();
        const DAY = 86400000;
        let cutoff = 0;

        if (range === 'today') {
          const d = new Date();
          d.setHours(0, 0, 0, 0);
          cutoff = d.getTime();
        } else if (range === '7days') {
          cutoff = now - 7 * DAY;
        } else if (range === '1month') {
          cutoff = now - 30 * DAY;
        } else if (range === '3months') {
          cutoff = now - 90 * DAY;
        } else if (range === '1year') {
          cutoff = now - 365 * DAY;
        }

        return salesHistory().filter(item => {
          if (!item.timestamp) return true;
          return item.timestamp >= cutoff;
        });
      });

      // Filtered Dashboard Metrics (Loyverse POS 5 KPI Cards Calculation)
      const dashboardMetrics = createMemo(() => {
        const sales = dashboardFilteredSales();
        const grossSales = sales.reduce((sum, r) => sum + (r.total || 0), 0);
        const count = sales.length;
        const avgBill = count > 0 ? grossSales / count : 0;
        const refunds = 0;
        const discounts = 0;
        const netSales = grossSales - refunds - discounts;
        const netProfit = Math.round(netSales * 0.35);

        // Top selling products aggregation
        const productSalesMap = {};
        sales.forEach(bill => {
          if (bill.items && Array.isArray(bill.items)) {
            bill.items.forEach(item => {
              const name = item.name || item.productName || 'สินค้าทั่วไป';
              const qty = item.qty || 1;
              const revenue = (item.price || 0) * qty;
              if (!productSalesMap[name]) {
                productSalesMap[name] = { name, qty: 0, revenue: 0 };
              }
              productSalesMap[name].qty += qty;
              productSalesMap[name].revenue += revenue;
            });
          }
        });

        const topProducts = Object.values(productSalesMap)
          .sort((a, b) => b.revenue - a.revenue)
          .slice(0, 5);

        return { grossSales, refunds, discounts, netSales, netProfit, count, avgBill, topProducts };
      });

      // Daily Closure State
      const [closureLoading, setClosureLoading] = createSignal(false);
      const [closureResultModal, setClosureResultModal] = createSignal(null);

      let html5QrScannerInstance = null;
      let lastScannedCode = '';
      let lastScannedTime = 0;
      let isScanLocked = false;

      // Thai Voice Assistant
      const speakThai = (text) => {
        if (!soundEnabled()) return;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = 'th-TH';
          msg.rate = 0.95;
          msg.pitch = 1.0;
          window.speechSynthesis.speak(msg);
        }
      };

      // Fetch Products from Google Apps Script API with 5-Second AbortController Timeout
      const fetchProductsFromAPI = async () => {
        setLoading(true);
        setApiError(null);
        
        // 5-second timeout controller so loading screen never hangs
        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
          try { controller.abort(); } catch(e){}
        }, 5000);

        try {
          const res = await fetch(API_URL, { signal: controller.signal });
          clearTimeout(timeoutId);
          if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
          const rawData = await res.json();
          
          const validItems = rawData.filter(item => 
            item && 
            item.productName && 
            String(item.productName).trim() !== '' &&
            item.price !== '' && 
            item.price !== undefined
          ).map(item => ({
            productID: item.productID || Math.random(),
            productName: String(item.productName).trim(),
            category: item.category || 'สินค้าทั่วไป',
            price: parseFloat(item.price) || 0,
            cost: parseFloat(item.cost) || 0,
            stock: parseInt(item.stock, 10) || 0
          }));

          if (validItems.length > 0) {
            setProducts(validItems);
          }
          setLastFetchTime(new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }));
        } catch (err) {
          clearTimeout(timeoutId);
          console.warn('API Fetch timed out or failed. Falling back to offline dataset immediately:', err);
          setApiError('ไม่สามารถดึงข้อมูลออนไลน์ได้ (ใช้งานข้อมูลสินค้าสำรองในเครื่อง)');
        } finally {
          setLoading(false);
        }
      };

      // Trigger async fetch after render safely
      setTimeout(fetchProductsFromAPI, 50);

      // Categories
      const categoriesList = createMemo(() => {
        const cats = new Set(products().map(p => p.category));
        return ['ทั้งหมด', ...Array.from(cats)];
      });

      // Filtered Products with try...catch protection
      const filteredProducts = createMemo(() => {
        try {
          const q = String(searchQuery() || '').trim().toLowerCase();
          const cat = selectedCategory();
          return products().filter(p => {
            if (!p) return false;
            const matchCat = cat === 'ทั้งหมด' || p.category === cat;
            const matchSearch = !q || (p.productName && p.productName.toLowerCase().includes(q)) || String(p.productID).includes(q);
            return matchCat && matchSearch;
          });
        } catch (err) {
          console.error("Filtered products error caught safely:", err);
          return products();
        }
      });

      // Cart Totals & Silom POS Pricing Memos (Subtotal & VAT 7%)
      const totalAmount = createMemo(() => cart().reduce((sum, i) => sum + (i.price * i.qty), 0));
      const totalItemsCount = createMemo(() => cart().reduce((sum, i) => sum + i.qty, 0));
      const cartSubtotal = createMemo(() => totalAmount() / 1.07);
      const cartVat = createMemo(() => totalAmount() - cartSubtotal());
      const cashNum = createMemo(() => parseFloat(cashInput()) || 0);
      const changeAmount = createMemo(() => Math.max(0, cashNum() - totalAmount()));

      // Thai Banknotes Breakdown for Cash Change
      const changeBreakdown = createMemo(() => {
        let remaining = Math.floor(changeAmount());
        const result = [];
        const units = [
          { name: 'แบงก์ 500', value: 500, type: 'note' },
          { name: 'แบงก์ 100', value: 100, type: 'note' },
          { name: 'แบงก์ 50', value: 50, type: 'note' },
          { name: 'แบงก์ 20', value: 20, type: 'note' },
          { name: 'เหรียญ 10', value: 10, type: 'coin' },
          { name: 'เหรียญ 5', value: 5, type: 'coin' },
          { name: 'เหรียญ 2', value: 2, type: 'coin' },
          { name: 'เหรียญ 1', value: 1, type: 'coin' }
        ];
        for (const u of units) {
          if (remaining >= u.value) {
            const count = Math.floor(remaining / u.value);
            remaining %= u.value;
            result.push({ ...u, count });
          }
        }
        return result;
      });

      // Cart Operations
      const addToCart = (product) => {
        // If product is in 'เนื้อสัตว์' or weighted and not customized yet, trigger weight modal
        if ((product.category === 'เนื้อสัตว์' || product.isWeighted) && !product._isWeightedCustom) {
          setWeightModalProduct(product);
          setWeightInput('');
          setWeightUnit('kg');
          playAudioTone('click');
          return;
        }

        const current = cart();
        const existing = current.find(i => i.productID === product.productID);
        const qtyInCart = existing ? existing.qty : 0;

        if (qtyInCart >= product.stock) {
          playAudioTone('error');
          speakThai(`สินค้า ${product.productName} หมดสต็อคแล้วค่ะ`);
          alert(`❌ สินค้า "${product.productName}" สต็อคหมดแล้ว ไม่สามารถเพิ่มได้อีกครับ!`);
          return;
        }

        const remainingAfter = product.stock - (qtyInCart + 1);

        playAudioTone('add');
        if (existing) {
          setCart(current.map(i => i.productID === product.productID ? { ...i, qty: i.qty + 1 } : i));
        } else {
          setCart([...current, { ...product, qty: 1 }]);
        }
        speakThai(`เพิ่ม ${product.productName} ${product.price} บาท`);

        // Alert Toast Notification when stock is 2 or fewer
        if (remainingAfter <= 2 && remainingAfter >= 0) {
          setTimeout(() => {
            playAudioTone('error');
            speakThai(`เตือน สินค้า ${product.productName} เหลือในสต็อคเพียง ${remainingAfter} ชิ้นค่ะ`);
            alert(`⚠️ แจ้งเตือนสินค้าใกล้หมด!\n\nสินค้า "${product.productName}" เหลือในสต็อคเพียง ${remainingAfter} ชิ้น!`);
          }, 200);
        }
      };

      const updateQty = (productID, delta) => {
        playAudioTone('click');
        const targetProduct = products().find(p => p.productID === productID);
        const updated = cart().map(item => {
          if (item.productID === productID) {
            const newQty = item.qty + delta;
            if (targetProduct && newQty > targetProduct.stock) {
              playAudioTone('error');
              alert(`สินค้ามีสต็อคเพียง ${targetProduct.stock} ชิ้นครับ!`);
              return item;
            }
            return newQty > 0 ? { ...item, qty: newQty } : null;
          }
          return item;
        }).filter(Boolean);
        setCart(updated);
      };

      const removeFromCart = (productID) => {
        playAudioTone('click');
        setCart(cart().filter(item => item.productID !== productID));
      };

      const clearCart = () => {
        if (cart().length === 0) return;
        if (confirm('คุณตา/คุณยาย ต้องการยกเลิกรายการในตะกร้าทั้งหมดใช่หรือไม่?')) {
          playAudioTone('click');
          setCart([]);
          speakThai('ยกเลิกรายการทั้งหมดแล้วค่ะ');
        }
      };

      // Barcode Submit Handler with try...catch protection
      const handleBarcodeSubmit = (val) => {
        try {
          const inputStr = String(val || '').trim();
          if (!inputStr) return;

          const exactMatch = products().find(p => p && String(p.productID) === inputStr);
          if (exactMatch) {
            addToCart(exactMatch);
            setSearchQuery('');
            const barcodeInputEl = document.getElementById('barcode-input');
            if (barcodeInputEl) barcodeInputEl.value = '';
            return;
          }

          const matches = filteredProducts();
          if (matches && matches.length === 1) {
            addToCart(matches[0]);
            setSearchQuery('');
            const barcodeInputEl = document.getElementById('barcode-input');
            if (barcodeInputEl) barcodeInputEl.value = '';
            return;
          }

          playAudioTone('error');
          speakThai('ไม่พบบาร์โค้ดสินค้านี้ค่ะ');
        } catch (err) {
          console.error("Barcode submit error caught safely:", err);
        }
      };

      // Camera Barcode Scanning (html5-qrcode) Helper with Single Scan Lock & Debounce
      const openCameraScanner = () => {
        playAudioTone('click');
        setCameraModalOpen(true);
        setTimeout(() => {
          if (window.Html5Qrcode) {
            try {
              html5QrScannerInstance = new Html5Qrcode("reader");
              html5QrScannerInstance.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 260, height: 180 } },
                (decodedText) => {
                  const now = Date.now();
                  if (isScanLocked) return;
                  if (decodedText === lastScannedCode && (now - lastScannedTime < 1800)) return;

                  isScanLocked = true;
                  lastScannedCode = decodedText;
                  lastScannedTime = now;

                  handleBarcodeSubmit(decodedText);
                  playAudioTone('beep');

                  setTimeout(() => {
                    isScanLocked = false;
                  }, 1800);
                },
                (err) => {}
              ).catch(err => {
                console.error("Camera access error:", err);
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตสิทธิ์การใช้งานกล้องในเบราว์เซอร์มือถือของคุณครับ");
                setCameraModalOpen(false);
              });
            } catch (e) {
              console.error("Scanner init error:", e);
            }
          } else {
            alert("ไม่สามารถดึงไลบรารีสแกนกล้องได้");
          }
        }, 300);
      };

      const closeCameraScanner = () => {
        if (html5QrScannerInstance) {
          html5QrScannerInstance.stop().then(() => {
            html5QrScannerInstance.clear();
          }).catch(err => {}).finally(() => {
            html5QrScannerInstance = null;
            setCameraModalOpen(false);
          });
        } else {
          setCameraModalOpen(false);
        }
      };

      // Auto Refocus Barcode Input
      createEffect(() => {
        if (activeTab() !== 'pos') return;
        const refocusBarcode = (e) => {
          if (cameraModalOpen()) return;
          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'BUTTON' || active.tagName === 'TEXTAREA')) {
            return;
          }
          const barcodeEl = document.getElementById('barcode-input');
          if (barcodeEl) barcodeEl.focus();
        };
        document.addEventListener('click', refocusBarcode);
      });

      const openPaymentModal = (type) => {
        if (cart().length === 0) {
          playAudioTone('error');
          alert('กรุณาเลือกสินค้าลงตะกร้าก่อนชำระเงินครับ!');
          speakThai('ยังไม่มีสินค้าในตะกร้าค่ะ');
          return;
        }
        playAudioTone('click');
        setActivePaymentType(type);
        setCashInput('');

        if (type === 'cash') speakThai(`ชำระเงินสด ยอดรวม ${totalAmount()} บาท`);
        else if (type === 'transfer') speakThai(`โอนเงินเข้าบัญชี ยอดรวม ${totalAmount()} บาท`);
        else if (type === 'thongfah') speakThai(`ชำระด้วยบัตรสวัสดิการแห่งรัฐ โครงการธงฟ้า ${totalAmount()} บาท`);
        else if (type === 'thaichueaythai') speakThai(`ชำระด้วยโครงการไทยช่วยไทย ${totalAmount()} บาท`);
      };

      const completePayment = async (methodName) => {
        playAudioTone('pay');
        
        const currentCart = [...cart()];
        const currentTotal = totalAmount();

        // Deduct stock
        const updatedProducts = products().map(p => {
          const cartItem = currentCart.find(ci => ci.productID === p.productID);
          return cartItem ? { ...p, stock: Math.max(0, p.stock - cartItem.qty) } : p;
        });
        setProducts(updatedProducts);

        const receipt = {
          id: 'BILL-' + Math.floor(100000 + Math.random() * 900000),
          date: new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }),
          time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
          method: methodName,
          items: currentCart,
          total: currentTotal,
          cash: methodName === 'เงินสด' ? cashNum() : currentTotal,
          change: methodName === 'เงินสด' ? changeAmount() : 0,
          breakdown: methodName === 'เงินสด' ? changeBreakdown() : []
        };

        speakThai(`ชำระเงินด้วย ${methodName} สำเร็จแล้ว ยอดรวม ${receipt.total} บาท ขอบคุณค่ะ`);
        setSalesHistory([receipt, ...salesHistory()]);
        setCompletedReceipt(receipt);
        setActivePaymentType(null);

        // POST Sales Data to Google Apps Script Web App URL with items array & no-cors mode
        const salesDataPayload = {
          orderId: "ORD-" + Date.now(),
          totalAmount: currentTotal,
          paymentType: methodName,
          cashier: "เจ้าของร้าน",
          items: currentCart.map(item => ({
            id: item.productID || item.productName,
            name: item.productName,
            qty: item.qty,
            price: item.price
          }))
        };

        try {
          fetch(SALES_POST_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(salesDataPayload)
          }).then(() => console.log('Successfully posted sales data to Google Script (no-cors)'))
            .catch(err => console.log('POST request dispatched via no-cors mode'));
        } catch (e) {
          console.error('Error posting sale data to Google Apps Script:', e);
        }

        // Clear cart immediately for next order
        setCart([]);
        setCashInput('');
      };

      const finishOrder = () => {
        setCart([]);
        setCashInput('');
        setCompletedReceipt(null);
      };

      // Chart.js Dashboard Render Effect
      createEffect(() => {
        if (activeTab() === 'dashboard') {
          setTimeout(() => {
            const todayTotal = salesHistory().reduce((sum, r) => sum + r.total, 0);
            const cashTotal = salesHistory().filter(r => r.method.includes('เงินสด')).reduce((sum, r) => sum + r.total, 0);
            const transferTotal = salesHistory().filter(r => r.method.includes('โอน')).reduce((sum, r) => sum + r.total, 0);
            const thongfahTotal = salesHistory().filter(r => r.method.includes('ธงฟ้า')).reduce((sum, r) => sum + r.total, 0);
            const thaiChueayTotal = salesHistory().filter(r => r.method.includes('ไทยช่วยไทย')).reduce((sum, r) => sum + r.total, 0);

            // Render Line Chart (Loyverse POS Green Theme)
            const ctx1 = document.getElementById('revenueTrendChart');
            if (ctx1 && window.Chart) {
              if (window.myRevenueChart) window.myRevenueChart.destroy();
              window.myRevenueChart = new Chart(ctx1, {
                type: 'line',
                data: {
                  labels: ['17 ก.ค.', '18 ก.ค.', '19 ก.ค.', '20 ก.ค.', '21 ก.ค.', '22 ก.ค.', 'วันนี้'],
                  datasets: [{
                    label: 'ยอดขายสุทธิรายวัน (บาท)',
                    data: [1250, 1980, 2400, 1600, 2850, 3400, Math.max(1290, todayTotal)],
                    borderColor: '#2E7D32',
                    backgroundColor: 'rgba(46, 125, 50, 0.12)',
                    fill: true,

                    pointBackgroundColor: '#2E7D32',
                    pointHoverRadius: 7
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { labels: { font: { family: 'Plus Jakarta Sans, Prompt', size: 15, weight: '500' }, color: '#374151' } }
                  },
                  scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: '#F3F4F6' } }
                  }
                }
              });
            }

            // Render Doughnut Chart
            const ctx2 = document.getElementById('paymentMethodChart');
            if (ctx2 && window.Chart) {
              if (window.myPaymentChart) window.myPaymentChart.destroy();
              window.myPaymentChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                  labels: ['เงินสด 💵', 'โอนเข้าบัญชี 📲', 'ธงฟ้าประชารัฐ 🏷️', 'ไทยช่วยไทย 🇹🇭'],
                  datasets: [{
                    data: [
                      Math.max(310, cashTotal),
                      Math.max(320, transferTotal),
                      Math.max(450, thongfahTotal),
                      Math.max(210, thaiChueayTotal)
                    ],
                    backgroundColor: ['#0284c7', '#0369a1', '#0f172a', '#38bdf8'],
                    borderWidth: 3
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans, Prompt', size: 15, weight: '500' } } }
                  }
                }
              });
            }
          }, 150);
        }
      });

      // API Call: Action=sendReport
      const handleDailyClosureAction = async () => {
        if (!confirm('คุณตา/คุณยาย ต้องการปิดยอดขายประจำวันนี้ของ สุวรรณ การค้า และส่งรายงานสรุปเข้า Email ใช่หรือไม่?')) return;

        setClosureLoading(true);
        playAudioTone('pay');

        const todaySales = salesHistory();
        const todayTotal = todaySales.reduce((s, r) => s + r.total, 0);
        const billCount = todaySales.length;

        const cashSum = todaySales.filter(r => r.method.includes('เงินสด')).reduce((s, r) => s + r.total, 0);
        const transferSum = todaySales.filter(r => r.method.includes('โอน')).reduce((s, r) => s + r.total, 0);
        const thongfahSum = todaySales.filter(r => r.method.includes('ธงฟ้า')).reduce((s, r) => s + r.total, 0);
        const thaiChueaySum = todaySales.filter(r => r.method.includes('ไทยช่วยไทย')).reduce((s, r) => s + r.total, 0);

        const closureReportData = {
          storeName: 'สุวรรณ การค้า',
          date: new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }),
          time: new Date().toLocaleTimeString('th-TH'),
          todayTotal: todayTotal,
          billCount: billCount,
          cashSum: cashSum,
          transferSum: transferSum,
          thongfahSum: thongfahSum,
          thaiChueaySum: thaiChueaySum
        };

        try {

          });
        } catch (e) {

        } finally {
          setClosureLoading(false);
          setClosureResultModal(closureReportData);
          speakThai(`ปิดยอดขายประจำวัน สุวรรณ การค้า สำเร็จแล้ว ยอดรวมวันนี้ ${todayTotal} บาท ส่งรายงานสรุปเข้าอีเมลเรียบร้อยค่ะ`);
        }
      };

      // Expense Submit Handler
      const handleExpenseSubmit = async (e) => {
        if (e) e.preventDefault();
        const name = expenseName().trim();
        const amt = parseFloat(expenseAmount());
        if (!name) {
          alert('กรุณากรอกชื่อรายการรายจ่ายด้วยครับ');
          return;
        }
        if (!amt || amt <= 0) {
          alert('กรุณากรอกจำนวนเงินให้ถูกต้องครับ');
          return;
        }

        setExpenseSubmitting(true);
        playAudioTone('pay');

        const payload = {
          action: "addExpense",
          expenseId: "EXP-" + Date.now(),
          date: new Date().toLocaleDateString('th-TH'),
          time: new Date().toLocaleTimeString('th-TH'),
          name: name,
          amount: amt,
          note: expenseNote().trim(),
          recordedBy: "เจ้าของร้าน"
        };

        try {
          fetch(SALES_POST_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          }).then(() => console.log('Successfully posted expense to Google Script'))
            .catch(err => console.log('Expense POST request dispatched via no-cors mode'));
        } catch (e) {
          console.error('Error posting expense to Google Apps Script:', e);
        } finally {

                    <div class="text-slate-950 font-bold text-5xl sm:text-6xl text-sky-950 tracking-tight">
                      ฿${totalAmount().toLocaleString('th-TH', { minimumFractionDigits: 2 })}
                    </div>
                  </div>

                  <!-- 2. Dynamic Real-Time PromptPay QR Code Graphic -->
                  <div class="p-3 bg-white border-4 border-slate-900 rounded-3xl shadow-lg my-1 flex flex-col items-center gap-2">
                    <div class="bg-sky-900 text-white font-bold text-base px-4 py-1 rounded-lg w-full flex items-center justify-center gap-2">
                      <span>🇹🇭 PromptPay</span>
                      <span class="text-xs bg-sky-600 px-2 py-0.5 rounded">พร้อมเพย์</span>
                    </div>
                    <img 
                      src="https://promptpay.io/0824829169/${totalAmount()}.png" 
                      alt="PromptPay QR Code ฿${totalAmount()}"
                      class="w-56 h-56 sm:w-64 sm:h-64 object-contain rounded-xl border border-slate-200 shadow-inner"
                      onError=${(e) => {
                        // Fallback to high resolution generated PromptPay card image
                        e.target.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=0824829169';
                      }}
                    />
                    <span class="text-xs text-slate-500 font-normal">สแกนจ่ายได้ทุกแอปธนาคาร</span>
                  </div>

                  <div class="text-center font-normal">
                    <p class="text-lg text-slate-800">ชื่อบัญชี: <span class="font-bold text-slate-950">นางสุวรรณา คล้ายสุวรรณ์</span></p>
                    <p class="text-2xl text-sky-900 font-bold">พร้อมเพย์: 082-482-9169</p>
                  </div>
                </div>

                <!-- 3. Large Bright Sky Blue Confirm Button -->
                <button 
                  onClick=${() => completePayment('โอนเข้าบัญชี (พร้อมเพย์)')}
                  class="senior-btn py-5 bg-sky-600 hover:bg-sky-700 text-white font-bold text-2xl sm:text-3xl rounded-3xl shadow-xl border-2 border-sky-400 flex items-center justify-center gap-2"
                >
                  <span>✅ กดยืนยันรับเงินเรียบร้อย</span>
                </button>
              </div>
            </div>
          ` : ''}

          ${() => activePaymentType() === 'thongfah' ? html`
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div class="bg-white border-2 border-slate-300 rounded-3xl max-w-lg w-full p-6 shadow-2xl flex flex-col gap-4 text-center">
                <div class="flex items-center justify-between border-b border-slate-200 pb-3">
                  <h3 class="font-normal text-3xl text-slate-900 flex items-center gap-2">
                    <span>🏷️ โครงการธงฟ้าประชารัฐ</span>
                  </h3>
                  <button 
                    onClick=${() => setActivePaymentType(null)}
                    class="senior-btn bg-slate-200 text-slate-800 px-4 py-2 rounded-2xl text-lg font-normal"
                  >
                    ✕ ปิด
                  </button>
                </div>

                <div class="bg-sky-50 p-6 rounded-3xl border border-sky-200 flex flex-col gap-3 items-center">
                  <span class="text-6xl">💳</span>
                  <h4 class="font-normal text-2xl text-slate-950">สแกนบัตรสวัสดิการแห่งรัฐ</h4>
                  <p class="text-slate-700 text-base font-normal">เสียบบัตรประชาชน / สแกนใบหน้า เพื่อตัดวงเงินธงฟ้าประชารัฐ</p>

                  <div class="bg-slate-900 border border-sky-500 p-4 rounded-2xl w-full text-center shadow-inner text-white">
                    <span class="text-slate-300 text-base font-normal">ยอดเงินตัดบัตรธงฟ้า:</span>
                    <div class="text-sky-400 font-normal text-4xl sm:text-5xl mt-1">
                      ฿${totalAmount().toLocaleString('th-TH', { minimumFractionDigits: 2 })}
                    </div>
                  </div>
                </div>

                <button 
                  onClick=${() => completePayment('โครงการธงฟ้าประชารัฐ')}
                  class="senior-btn py-4 bg-sky-600 hover:bg-sky-700 text-white font-normal text-2xl rounded-2xl shadow-xl border border-sky-500"
                >
                  ✅ อนุมัติการตัดวงเงินธงฟ้า
                </button>
              </div>
            </div>
          ` : ''}

          ${() => activePaymentType() === 'thaichueaythai' ? html`
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div class="bg-white border-2 border-slate-300 rounded-3xl max-w-lg w-full p-6 shadow-2xl flex flex-col gap-4 text-center">
                <div class="flex items-center justify-between border-b border-slate-200 pb-3">
                  <h3 class="font-normal text-3xl text-slate-900 flex items-center gap-2">
                    <span>🇹🇭 โครงการไทยช่วยไทย</span>
                  </h3>
                  <button 
                    onClick=${() => setActivePaymentType(null)}
                    class="senior-btn bg-slate-200 text-slate-800 px-4 py-2 rounded-2xl text-lg font-normal"
                  >
                    ✕ ปิด
                  </button>
                </div>

                <div class="bg-sky-50 p-6 rounded-3xl border border-sky-200 flex flex-col gap-3 items-center">
                  <span class="text-6xl">🤝</span>
                  <h4 class="font-normal text-2xl text-slate-950">สแกนสิทธิ์โครงการไทยช่วยไทย</h4>
                  <p class="text-slate-700 text-base font-normal">ใช้สิทธิ์ส่วนลดและเงินอุดหนุนจากโครงการรัฐบาล</p>

                  <div class="bg-slate-900 border border-sky-500 p-4 rounded-2xl w-full text-center shadow-inner text-white">
                    <span class="text-slate-300 text-base font-normal">ยอดใช้สิทธิ์ชำระ:</span>
                    <div class="text-sky-400 font-normal text-4xl sm:text-5xl mt-1">
                      ฿${totalAmount().toLocaleString('th-TH', { minimumFractionDigits: 2 })}
                    </div>
                  </div>
                </div>

                <button 
                  onClick=${() => completePayment('โครงการไทยช่วยไทย')}
                  class="senior-btn py-4 bg-sky-600 hover:bg-sky-700 text-white font-normal text-2xl rounded-2xl shadow-xl border border-sky-500"
                >
                  ✅ อนุมัติสิทธิ์โครงการไทยช่วยไทย
                </button>
              </div>
            </div>
          ` : ''}

          <!-- COMPLETED TRANSACTION RECEIPT MODAL -->
          ${() => completedReceipt() ? html`
            <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4 font-normal">
              <div class="bg-white border-2 border-slate-300 rounded-3xl max-w-lg w-full p-6 shadow-2xl flex flex-col gap-4">
                <div class="text-center bg-sky-50 p-4 rounded-2xl border border-sky-200">
                  <span class="text-6xl">🎉</span>
                  <h2 class="font-normal text-3xl text-slate-900 mt-1">ขายสินค้าสำเร็จ!</h2>
                  <p class="text-slate-800 text-lg font-normal mt-1">ชำระด้วย: ${completedReceipt().method}</p>
                </div>

                <div id="printable-receipt" class="bg-slate-50 text-slate-950 p-6 rounded-2xl border border-slate-300 font-mono text-lg shadow-inner">
                  <div class="text-center pb-3 border-b-2 border-dashed border-slate-400 mb-3">
                    <h3 class="font-normal text-2xl text-slate-950">สุวรรณ การค้า</h3>
                    <p class="text-sm text-slate-600">ยินดีต้อนรับด้วยมิตรภาพและความจริงใจ</p>
                    <p class="text-sm text-slate-600 mt-1">เลขที่บิล: ${completedReceipt().id}</p>
                    <p class="text-sm text-slate-600">วันที่: ${completedReceipt().date} ${completedReceipt().time}</p>
                    <p class="text-sm font-normal text-sky-900 mt-1">ช่องทาง: ${completedReceipt().method}</p>
                  </div>

                  <div class="flex flex-col gap-2 text-base pb-3 border-b-2 border-dashed border-slate-400">
                    ${completedReceipt().items.map(i => html`
                      <div class="flex justify-between items-center">
                        <span>${i.productName} (x${i.qty})</span>
                        <span class="font-medium">${(i.price * i.qty).toFixed(2)}฿</span>
                      </div>
                    `)}
                  </div>

                  <div class="pt-3 flex flex-col gap-1.5 text-lg">
                    <div class="flex justify-between font-normal text-xl">
                      <span>ยอดรวมทั้งสิ้น:</span>
                      <span class="text-2xl text-slate-950 font-medium">${completedReceipt().total.toFixed(2)} บาท</span>
                    </div>
                    ${completedReceipt().method === 'เงินสด' ? html`
                      <div class="flex justify-between text-slate-700">
                        <span>รับเงินสดมา:</span>
                        <span>${completedReceipt().cash.toFixed(2)} บาท</span>
                      </div>
                      <div class="flex justify-between font-normal text-sky-900 text-xl">
                        <span>เงินทอน:</span>
                        <span>${completedReceipt().change.toFixed(2)} บาท</span>
                      </div>
                    ` : ''}
                  </div>

                  <div class="text-center mt-4 pt-2 border-t border-slate-300 text-xs text-slate-500">
                    *** ขอขอบคุณที่อุดหนุน สุวรรณ การค้า ***
                  </div>
                </div>

                <div class="flex items-center gap-3">
                  <button 
                    onClick=${() => window.print()}
                    class="senior-btn flex-1 py-4 bg-slate-800 hover:bg-slate-700 text-white font-normal text-2xl rounded-2xl border border-slate-600 shadow-md"
                  >
                    🖨️ พิมพ์ใบเสร็จ
                  </button>

                  <button 
                    onClick=${finishOrder}
                    class="senior-btn flex-1 py-4 bg-sky-600 hover:bg-sky-700 text-white font-normal text-2xl rounded-2xl border border-sky-500 shadow-md"
                  >
                    ✨ เริ่มบิลถัดไป
                  </button>
                </div>
              </div>
            </div>
          ` : ''}

        </div>
      `;
    }

    // 6. Safe Initialization & Mount with Error Boundary & Timeout Protection
    function mountApp() {
      try {
        const root = document.getElementById('app');
        if (!root) return;
        
        // Render POS App instance
        const appNode = POSApp();
        root.innerHTML = '';
        root.appendChild(appNode);

        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          try { window.lucide.createIcons(); } catch(e){}
        }
      } catch (err) {
        console.error('Mount Error caught safely:', err);
        const root = document.getElementById('app');
        if (root) {
          root.innerHTML = `
            <div style="background-color:#0f172a; color:#ffffff; padding:40px; text-align:center; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-center:center; font-family:sans-serif;">
              <h2 style="font-size:28px; color:#f59e0b; margin-bottom:12px;">🏪 สุวรรณ การค้า POS - ระบบเข้าสู่โหมดสำรอง</h2>
              <p style="font-size:18px; color:#cbd5e1; margin-bottom:24px;">กำลังโหลดระบบด้วยข้อมูลสินค้าสำรองในเครื่อง</p>
              <button onclick="window.location.reload()" style="padding:14px 28px; background-color:#059669; color:#ffffff; font-size:18px; font-weight:bold; border:none; border-radius:16px; cursor:pointer;">
                🔄 โหลดระบบใหม่อีกครั้ง
              </button>
            </div>
          `;
        }
      }
    }

    // Dismiss loading screen immediately if ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', mountApp);
    } else {
      mountApp();
    }

    // Safety Timeout: Force mount after 1.5s if DOMContentLoaded event was missed
    setTimeout(() => {
      const root = document.getElementById('app');
      if (root && root.innerHTML.includes('กำลังโหลดระบบ POS')) {
        mountApp();
      }
    }, 1500);
  </script>
</body>
</html>
