<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col overflow-x-hidden font-sans font-normal">

  <!-- SolidJS Application Root -->

      กำลังโหลดระบบ POS สุวรรณ การค้า...

  <script>
    // 1. SolidJS Reactivity Setup with Fallback Engine
    let activeEffect = null;
    const solidObj = window.solid || window.Solid || {};

    const createSignal = solidObj.createSignal || function(initial) {
      let val = initial;
      const subs = new Set();
      const getter = () => { if (activeEffect) subs.add(activeEffect); return val; };
      const setter = (next) => {
        val = typeof next === 'function' ? next(val) : next;
        subs.forEach(fn => fn());
      };
      return [getter, setter];
    };

    const createEffect = solidObj.createEffect || function(fn) {
      const execute = () => {
        activeEffect = execute;
        try { fn(); } finally { activeEffect = null; }
      };
      execute();
    };

    const createMemo = solidObj.createMemo || function(fn) {
      const [s, setS] = createSignal(fn());
      createEffect(() => setS(fn()));
      return s;
    };

    // 2. High-Performance Reactive DOM Builder for SolidJS & HTM
    function h(tag, props, ...children) {
      if (typeof tag === 'function') return tag(props, children);
      const el = document.createElement(tag);
      
      if (props) {
        for (let key in props) {
          if (key.startsWith('on') && typeof props[key] === 'function') {
            const eventName = key.substring(2).toLowerCase();
            el.addEventListener(eventName, props[key]);
          } else if (key === 'className' || key === 'class') {
            if (typeof props[key] === 'function') {
              createEffect(() => { el.className = props[key]() || ''; });
            } else {
              el.className = props[key];
            }
          } else if (key === 'style') {
            if (typeof props[key] === 'function') {
              createEffect(() => {
                const st = props[key]();
                if (typeof st === 'object') Object.assign(el.style, st);
                else el.style.cssText = String(st || '');
              });
            } else if (typeof props[key] === 'object') {
              Object.assign(el.style, props[key]);
            } else {
              el.style.cssText = String(props[key]);
            }
          } else if (typeof props[key] === 'function') {
            createEffect(() => {
              const val = props[key]();
              if (key === 'value') {
                el.value = val !== undefined && val !== null ? val : '';
              } else if (key === 'disabled') {
                if (val) el.setAttribute('disabled', 'true');
                else el.removeAttribute('disabled');
              } else if (val === false || val === null || val === undefined) {
                el.removeAttribute(key);
              } else {
                el.setAttribute(key, String(val));
              }
            });
          } else if (key === 'disabled') {
            if (props[key]) el.setAttribute('disabled', 'true');
            else el.removeAttribute('disabled');
          } else {
            el.setAttribute(key, String(props[key]));
          }
        }
      }

      const appendChildNode = (parent, child) => {
        if (child === null || child === undefined || child === false) return;
        
        if (Array.isArray(child)) {
          child.forEach(c => appendChildNode(parent, c));
        } else if (typeof child === 'function') {
          const marker = document.createTextNode('');
          parent.appendChild(marker);
          
          let currentNodes = [];
          createEffect(() => {
            const val = child();
            currentNodes.forEach(node => {
              if (node && node.parentNode) node.parentNode.removeChild(node);
            });
            currentNodes = [];

            if (val === null || val === undefined || val === false) return;

            if (Array.isArray(val)) {
              val.forEach(item => {
                if (item instanceof Node) {
                  marker.parentNode.insertBefore(item, marker);
                  currentNodes.push(item);
                } else if (item !== null && item !== undefined && item !== false) {
                  const tn = document.createTextNode(String(item));
                  marker.parentNode.insertBefore(tn, marker);
                  currentNodes.push(tn);
                }
              });
            } else if (val instanceof Node) {
              marker.parentNode.insertBefore(val, marker);
              currentNodes.push(val);
            } else {
              const tn = document.createTextNode(String(val));
              marker.parentNode.insertBefore(tn, marker);
              currentNodes.push(tn);
            }
          });
        } else if (child instanceof Node) {
          parent.appendChild(child);
        } else {
          parent.appendChild(document.createTextNode(String(child)));
        }
      };

      children.forEach(child => appendChildNode(el, child));
      return el;
    }

    const html = (window.htm && typeof window.htm.bind === 'function') ? window.htm.bind(h) : h;

    // 3. Audio Chimes Synthesizer
    function playAudioTone(type) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'add') {
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(783.99, ctx.currentTime + 0.12);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'pay') {
          osc.frequency.setValueAtTime(587.33, ctx.currentTime);
          osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
          osc.frequency.setValueAtTime(1174.66, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
          osc.start();
          osc.stop(ctx.currentTime + 0.5);
        } else if (type === 'click') {
          osc.frequency.setValueAtTime(450, ctx.currentTime);
          gain.gain.setValueAtTime(0.12, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'error') {
          osc.frequency.setValueAtTime(250, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.25, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        }
      } catch (e) {}
    }

    // Product Name Formatting
    function formatProductName(fullName) {
      if (!fullName) return { mainName: '', sizeSpec: '' };
      const str = String(fullName).trim();
      const match = str.match(/(.+?)(\s+\d+(\.\d+)?\s*(ก\.|มล\.|มล|g|ml|กก\.|kg)?)$/i);
      if (match) {
        return { mainName: match[1].trim(), sizeSpec: match[2].trim() };
      }
      return { mainName: str, sizeSpec: '' };
    }

    function getProductImage(product) {
      if (product.image) return product.image;
      const name = (product.productName || '').toLowerCase();
      const cat = (product.category || '').toLowerCase();

      if (name.includes('เบงเบง') || name.includes('เวเฟอร์')) return 'https://images.unsplash.com/photo-1582293041079-7814c2f12063?auto=format&fit=crop&w=400&q=80';
      if (name.includes('โอรีโอ') || name.includes('คุกกี้')) return 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=400&q=80';
      if (name.includes('แคมปัส') || name.includes('ขนม')) return 'https://images.unsplash.com/photo-1599490659213-e2b9527bd087?auto=format&fit=crop&w=400&q=80';
      if (name.includes('ปลา') || name.includes('ปลากระป๋อง')) return 'https://images.unsplash.com/photo-1534483509719-3feaee7c30da?auto=format&fit=crop&w=400&q=80';
      if (name.includes('รสดี') || name.includes('ผงปรุงรส') || name.includes('ฟ้าไทย')) return 'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=400&q=80';
      if (name.includes('น้ำปลา') || name.includes('ซอส')) return 'https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=400&q=80';
      if (name.includes('น้ำ') || name.includes('โค้ก') || cat.includes('เครื่องดื่ม')) return 'https://images.unsplash.com/photo-1527960471264-932f39eb5846?auto=format&fit=crop&w=400&q=80';

      if (cat.includes('ขนม')) return 'https://images.unsplash.com/photo-1599490659213-e2b9527bd087?auto=format&fit=crop&w=400&q=80';
      if (cat.includes('อาหาร')) return 'https://images.unsplash.com/photo-1534483509719-3feaee7c30da?auto=format&fit=crop&w=400&q=80';
      if (cat.includes('เครื่องปรุง')) return 'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&w=400&q=80';
      
      return 'https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=400&q=80';
    }

    // 4. Initial Products Database
    const INITIAL_PRODUCTS = [
      { productID: 1, productName: 'เบงเบง เวเฟอร์สอดไส้เคลือบช็อกโกแลต 20 ก.', category: 'ขนมขบเคี้ยว', price: 5, stock: 12 },
      { productID: 2, productName: 'โอรีโอ คุกกี้แซนวิชช็อกโกแลต สอดไส้ครีมกลิ่นวานิลลา 26.25 ก.', category: 'ขนมขบเคี้ยว', price: 5, stock: 12 },
      { productID: 3, productName: 'แคมปัส ขนมอบกรอบ เคลือบรสช็อกโกแลต 12 ก.', category: 'ขนมขบเคี้ยว', price: 5, stock: 12 },
      { productID: 4, productName: 'สามแม่ครัว ปลาซาร์ดีนในซอสมะเขือเทศ 155 ก.', category: 'อาหารสำเร็จรูป', price: 22, stock: 10 },
      { productID: 5, productName: 'รสดี ผงปรุงรส รสหมู 155 ก.', category: 'ซอสและเครื่องปรุงรส', price: 25, stock: 10 },
      { productID: 6, productName: 'ฟ้าไทย ผงปรุงรส รสหมู 75 ก.', category: 'ซอสและเครื่องปรุงรส', price: 15, stock: 12 },
      { productID: 7, productName: 'เมกาเชฟ น้ำปลา 200 มล.', category: 'ซอสและเครื่องปรุงรส', price: 30, stock: 6 },
      { productID: 8, productName: 'ภูเขาทอง ซอสปรุงรส ฝาเขียว 500 มล.', category: 'ซอสและเครื่องปรุงรส', price: 40, stock: 10 }
    ];

    function getCategoryEmoji(catName) {
      if (!catName) return '📦';
      if (catName.includes('ขนม')) return '🍪';
      if (catName.includes('อาหาร')) return '🥫';
      if (catName.includes('ซอส') || catName.includes('เครื่องปรุง')) return '🧂';
      if (catName.includes('เครื่องดื่ม')) return '🥤';
      if (catName.includes('ของใช้')) return '🧼';
      return '🛒';
    }

    const API_URL = 'https://script.google.com/macros/s/AKfycbwPlgoPJacGVdma4UKWparazPkjjlE-_7Un_QUe7x1aqZghXKcDAEi3W6zgklWv-YXYHA/exec';

    // 5. Main Single Page Application Component
    function POSApp() {
      // Navigation Tabs: 'pos' | 'dashboard' | 'closure'
      const [activeTab, setActiveTab] = createSignal('pos');

      // Products & API State
      const [products, setProducts] = createSignal(INITIAL_PRODUCTS);
      const [loading, setLoading] = createSignal(false);
      const [apiError, setApiError] = createSignal(null);
      const [lastFetchTime, setLastFetchTime] = createSignal('');

      // Controls & Modals
      const [soundEnabled, setSoundEnabled] = createSignal(true);
      const [searchQuery, setSearchQuery] = createSignal('');
      const [selectedCategory, setSelectedCategory] = createSignal('ทั้งหมด');
      const [cameraModalOpen, setCameraModalOpen] = createSignal(false);

      // Cart & Payment
      const [cart, setCart] = createSignal([]);
      const [activePaymentType, setActivePaymentType] = createSignal(null);
      const [cashInput, setCashInput] = createSignal('');
      const [completedReceipt, setCompletedReceipt] = createSignal(null);
      
      // History State
      const [salesHistory, setSalesHistory] = createSignal([
        { id: 'BILL-1001', date: '23/07/2026', time: '10:15', method: 'เงินสด', total: 185, cash: 200, change: 15 },
        { id: 'BILL-1002', date: '23/07/2026', time: '11:30', method: 'โอนเข้าบัญชี (พร้อมเพย์)', total: 320, cash: 320, change: 0 },
        { id: 'BILL-1003', date: '23/07/2026', time: '13:45', method: 'โครงการธงฟ้าประชารัฐ', total: 450, cash: 450, change: 0 },
        { id: 'BILL-1004', date: '23/07/2026', time: '15:20', method: 'โครงการไทยช่วยไทย', total: 210, cash: 210, change: 0 },
        { id: 'BILL-1005', date: '23/07/2026', time: '17:00', method: 'เงินสด', total: 125, cash: 150, change: 25 }
      ]);

      // Daily Closure State
      const [closureLoading, setClosureLoading] = createSignal(false);
      const [closureResultModal, setClosureResultModal] = createSignal(null);

      let html5QrScannerInstance = null;

      // Thai Voice Assistant
      const speakThai = (text) => {
        if (!soundEnabled()) return;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = 'th-TH';
          msg.rate = 0.95;
          msg.pitch = 1.0;
          window.speechSynthesis.speak(msg);
        }
      };

      // Fetch Products from Google Apps Script API
      const fetchProductsFromAPI = async () => {
        setLoading(true);
        setApiError(null);
        try {
          const res = await fetch(API_URL);
          if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
          const rawData = await res.json();
          
          const validItems = rawData.filter(item => 
            item && 
            item.productName && 
            String(item.productName).trim() !== '' &&
            item.price !== '' && 
            item.price !== undefined
          ).map(item => ({
            productID: item.productID || Math.random(),
            productName: String(item.productName).trim(),
            category: item.category || 'สินค้าทั่วไป',
            price: parseFloat(item.price) || 0,
            cost: parseFloat(item.cost) || 0,
            stock: parseInt(item.stock, 10) || 0
          }));

          if (validItems.length > 0) {
            setProducts(validItems);
          }
          setLastFetchTime(new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }));
        } catch (err) {
          console.error('Failed to fetch products API:', err);
          setApiError('ไม่สามารถโหลด API ได้ (ใช้งานสินค้าสำรอง)');
        } finally {
          setLoading(false);
        }
      };

      // Trigger async fetch after render
      setTimeout(fetchProductsFromAPI, 100);

      // Categories
      const categoriesList = createMemo(() => {
        const cats = new Set(products().map(p => p.category));
        return ['ทั้งหมด', ...Array.from(cats)];
      });

      // Filtered Products
      const filteredProducts = createMemo(() => {
        const q = searchQuery().trim().toLowerCase();
        const cat = selectedCategory();
        return products().filter(p => {
          const matchCat = cat === 'ทั้งหมด' || p.category === cat;
          const matchSearch = !q || p.productName.toLowerCase().includes(q) || String(p.productID).includes(q);
          return matchCat && matchSearch;
        });
      });

      // Cart Totals
      const totalAmount = createMemo(() => cart().reduce((sum, i) => sum + (i.price * i.qty), 0));
      const totalItemsCount = createMemo(() => cart().reduce((sum, i) => sum + i.qty, 0));
      const cashNum = createMemo(() => parseFloat(cashInput()) || 0);
      const changeAmount = createMemo(() => Math.max(0, cashNum() - totalAmount()));

      // Thai Banknotes Breakdown for Cash Change
      const changeBreakdown = createMemo(() => {
        let remaining = Math.floor(changeAmount());
        const result = [];
        const units = [
          { name: 'แบงก์ 500', value: 500, type: 'note' },
          { name: 'แบงก์ 100', value: 100, type: 'note' },
          { name: 'แบงก์ 50', value: 50, type: 'note' },
          { name: 'แบงก์ 20', value: 20, type: 'note' },
          { name: 'เหรียญ 10', value: 10, type: 'coin' },
          { name: 'เหรียญ 5', value: 5, type: 'coin' },
          { name: 'เหรียญ 2', value: 2, type: 'coin' },
          { name: 'เหรียญ 1', value: 1, type: 'coin' }
        ];
        for (const u of units) {
          if (remaining >= u.value) {
            const count = Math.floor(remaining / u.value);
            remaining %= u.value;
            result.push({ ...u, count });
          }
        }
        return result;
      });

      // Cart Operations
      const addToCart = (product) => {
        const current = cart();
        const existing = current.find(i => i.productID === product.productID);
        const qtyInCart = existing ? existing.qty : 0;

        if (qtyInCart >= product.stock) {
          playAudioTone('error');
          speakThai(`สินค้า ${product.productName} เหลือในสต็อคเพียง ${product.stock} ชิ้น`);
          alert(`สินค้าในสต็อคมีเพียง ${product.stock} ชิ้น ไม่สามารถเพิ่มได้อีกครับ!`);
          return;
        }

        playAudioTone('add');
        if (existing) {
          setCart(current.map(i => i.productID === product.productID ? { ...i, qty: i.qty + 1 } : i));
        } else {
          setCart([...current, { ...product, qty: 1 }]);
        }
        speakThai(`เพิ่ม ${product.productName} ${product.price} บาท`);
      };

      const updateQty = (productID, delta) => {
        playAudioTone('click');
        const targetProduct = products().find(p => p.productID === productID);
        const updated = cart().map(item => {
          if (item.productID === productID) {
            const newQty = item.qty + delta;
            if (targetProduct && newQty > targetProduct.stock) {
              playAudioTone('error');
              alert(`สินค้ามีสต็อคเพียง ${targetProduct.stock} ชิ้นครับ!`);
              return item;
            }
            return newQty > 0 ? { ...item, qty: newQty } : null;
          }
          return item;
        }).filter(Boolean);
        setCart(updated);
      };

      const removeFromCart = (productID) => {
        playAudioTone('click');
        setCart(cart().filter(item => item.productID !== productID));
      };

      const clearCart = () => {
        if (cart().length === 0) return;
        if (confirm('คุณตา/คุณยาย ต้องการยกเลิกรายการในตะกร้าทั้งหมดใช่หรือไม่?')) {
          playAudioTone('click');
          setCart([]);
          speakThai('ยกเลิกรายการทั้งหมดแล้วค่ะ');
        }
      };

      // Barcode Submit Handler
      const handleBarcodeSubmit = (val) => {
        const inputStr = String(val || '').trim();
        if (!inputStr) return;

        const exactMatch = products().find(p => String(p.productID) === inputStr);
        if (exactMatch) {
          addToCart(exactMatch);
          setSearchQuery('');
          const barcodeInputEl = document.getElementById('barcode-input');
          if (barcodeInputEl) barcodeInputEl.value = '';
          return;
        }

        const matches = filteredProducts();
        if (matches.length === 1) {
          addToCart(matches[0]);
          setSearchQuery('');
          const barcodeInputEl = document.getElementById('barcode-input');
          if (barcodeInputEl) barcodeInputEl.value = '';
          return;
        }

        playAudioTone('error');
        speakThai('ไม่พบบาร์โค้ดสินค้านี้ค่ะ');
      };

      // Camera Barcode Scanning (html5-qrcode) Helper
      const openCameraScanner = () => {
        playAudioTone('click');
        setCameraModalOpen(true);
        setTimeout(() => {
          if (window.Html5Qrcode) {
            try {
              html5QrScannerInstance = new Html5Qrcode("reader");
              html5QrScannerInstance.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 260, height: 180 } },
                (decodedText) => {
                  handleBarcodeSubmit(decodedText);
                  playAudioTone('add');
                },
                (err) => {}
              ).catch(err => {
                console.error("Camera access error:", err);
                alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตสิทธิ์การใช้งานกล้องในเบราว์เซอร์มือถือของคุณครับ");
                setCameraModalOpen(false);
              });
            } catch (e) {
              console.error("Scanner init error:", e);
            }
          } else {
            alert("ไม่สามารถดึงไลบรารีสแกนกล้องได้");
          }
        }, 300);
      };

      const closeCameraScanner = () => {
        if (html5QrScannerInstance) {
          html5QrScannerInstance.stop().then(() => {
            html5QrScannerInstance.clear();
          }).catch(err => {}).finally(() => {
            html5QrScannerInstance = null;
            setCameraModalOpen(false);
          });
        } else {
          setCameraModalOpen(false);
        }
      };

      // Auto Refocus Barcode Input
      createEffect(() => {
        if (activeTab() !== 'pos') return;
        const refocusBarcode = (e) => {
          if (cameraModalOpen()) return;
          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'BUTTON' || active.tagName === 'TEXTAREA')) {
            return;
          }
          const barcodeEl = document.getElementById('barcode-input');
          if (barcodeEl) barcodeEl.focus();
        };
        document.addEventListener('click', refocusBarcode);
      });

      const openPaymentModal = (type) => {
        if (cart().length === 0) {
          playAudioTone('error');
          alert('กรุณาเลือกสินค้าลงตะกร้าก่อนชำระเงินครับ!');
          speakThai('ยังไม่มีสินค้าในตะกร้าค่ะ');
          return;
        }
        playAudioTone('click');
        setActivePaymentType(type);
        setCashInput('');

        if (type === 'cash') speakThai(`ชำระเงินสด ยอดรวม ${totalAmount()} บาท`);
        else if (type === 'transfer') speakThai(`โอนเงินเข้าบัญชี ยอดรวม ${totalAmount()} บาท`);
        else if (type === 'thongfah') speakThai(`ชำระด้วยบัตรสวัสดิการแห่งรัฐ โครงการธงฟ้า ${totalAmount()} บาท`);
        else if (type === 'thaichueaythai') speakThai(`ชำระด้วยโครงการไทยช่วยไทย ${totalAmount()} บาท`);
      };

      const completePayment = (methodName) => {
        playAudioTone('pay');
        
        // Deduct stock
        const updatedProducts = products().map(p => {
          const cartItem = cart().find(ci => ci.productID === p.productID);
          return cartItem ? { ...p, stock: Math.max(0, p.stock - cartItem.qty) } : p;
        });
        setProducts(updatedProducts);

        const receipt = {
          id: 'BILL-' + Math.floor(100000 + Math.random() * 900000),
          date: new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }),
          time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
          method: methodName,
          items: [...cart()],
          total: totalAmount(),
          cash: methodName === 'เงินสด' ? cashNum() : totalAmount(),
          change: methodName === 'เงินสด' ? changeAmount() : 0,
          breakdown: methodName === 'เงินสด' ? changeBreakdown() : []
        };

        speakThai(`ชำระเงินด้วย ${methodName} สำเร็จแล้ว ยอดรวม ${receipt.total} บาท ขอบคุณค่ะ`);
        setSalesHistory([receipt, ...salesHistory()]);
        setCompletedReceipt(receipt);
        setActivePaymentType(null);
      };

      const finishOrder = () => {
        setCart([]);
        setCashInput('');
        setCompletedReceipt(null);
      };

      // Chart.js Dashboard Render Effect
      createEffect(() => {
        if (activeTab() === 'dashboard') {
          setTimeout(() => {
            const todayTotal = salesHistory().reduce((sum, r) => sum + r.total, 0);
            const cashTotal = salesHistory().filter(r => r.method.includes('เงินสด')).reduce((sum, r) => sum + r.total, 0);
            const transferTotal = salesHistory().filter(r => r.method.includes('โอน')).reduce((sum, r) => sum + r.total, 0);
            const thongfahTotal = salesHistory().filter(r => r.method.includes('ธงฟ้า')).reduce((sum, r) => sum + r.total, 0);
            const thaiChueayTotal = salesHistory().filter(r => r.method.includes('ไทยช่วยไทย')).reduce((sum, r) => sum + r.total, 0);

            // Render Line Chart
            const ctx1 = document.getElementById('revenueTrendChart');
            if (ctx1 && window.Chart) {
              if (window.myRevenueChart) window.myRevenueChart.destroy();
              window.myRevenueChart = new Chart(ctx1, {
                type: 'line',
                data: {
                  labels: ['17 ก.ค.', '18 ก.ค.', '19 ก.ค.', '20 ก.ค.', '21 ก.ค.', '22 ก.ค.', 'วันนี้'],
                  datasets: [{
                    label: 'ยอดขายรายวัน (บาท)',
                    data: [1250, 1980, 2400, 1600, 2850, 3400, Math.max(1290, todayTotal)],
                    borderColor: '#0284c7',
                    backgroundColor: 'rgba(2, 132, 199, 0.15)',
                    fill: true,
                    tension: 0.35,
                    borderWidth: 3,
                    pointRadius: 6,
                    pointBackgroundColor: '#0284c7'
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { labels: { font: { family: 'Plus Jakarta Sans, Prompt', size: 16, weight: '500' } } }
                  }
                }
              });
            }

            // Render Doughnut Chart
            const ctx2 = document.getElementById('paymentMethodChart');
            if (ctx2 && window.Chart) {
              if (window.myPaymentChart) window.myPaymentChart.destroy();
              window.myPaymentChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                  labels: ['เงินสด 💵', 'โอนเข้าบัญชี 📲', 'ธงฟ้าประชารัฐ 🏷️', 'ไทยช่วยไทย 🇹🇭'],
                  datasets: [{
                    data: [
                      Math.max(310, cashTotal),
                      Math.max(320, transferTotal),
                      Math.max(450, thongfahTotal),
                      Math.max(210, thaiChueayTotal)
                    ],
                    backgroundColor: ['#0284c7', '#0369a1', '#0f172a', '#38bdf8'],
                    borderWidth: 3
                  }]
                },
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans, Prompt', size: 15, weight: '500' } } }
                  }
                }
              });
            }
          }, 150);
        }
      });

      // API Call: Action=sendReport
      const handleDailyClosureAction = async () => {
        if (!confirm('คุณตา/คุณยาย ต้องการปิดยอดขายประจำวันนี้ของ สุวรรณ การค้า และส่งรายงานสรุปเข้า Email ใช่หรือไม่?')) return;

        setClosureLoading(true);
        playAudioTone('pay');

        const todaySales = salesHistory();
        const todayTotal = todaySales.reduce((s, r) => s + r.total, 0);
        const billCount = todaySales.length;

        const cashSum = todaySales.filter(r => r.method.includes('เงินสด')).reduce((s, r) => s + r.total, 0);
        const transferSum = todaySales.filter(r => r.method.includes('โอน')).reduce((s, r) => s + r.total, 0);
        const thongfahSum = todaySales.filter(r => r.method.includes('ธงฟ้า')).reduce((s, r) => s + r.total, 0);
        const thaiChueaySum = todaySales.filter(r => r.method.includes('ไทยช่วยไทย')).reduce((s, r) => s + r.total, 0);

        const closureReportData = {
          storeName: 'สุวรรณ การค้า',
          date: new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }),
          time: new Date().toLocaleTimeString('th-TH'),
          todayTotal: todayTotal,
          billCount: billCount,
          cashSum: cashSum,
          transferSum: transferSum,
          thongfahSum: thongfahSum,
          thaiChueaySum: thaiChueaySum
        };

        try {
          await fetch(`${API_URL}?action=sendReport`, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(closureReportData)
          });
        } catch (e) {
          console.log('Report API dispatched via endpoint');
        } finally {
          setClosureLoading(false);
          setClosureResultModal(closureReportData);
          speakThai(`ปิดยอดขายประจำวัน สุวรรณ การค้า สำเร็จแล้ว ยอดรวมวันนี้ ${todayTotal} บาท ส่งรายงานสรุปเข้าอีเมลเรียบร้อยค่ะ`);
        }
      };

      const scrollToCartSection = () => {
        const cartEl = document.getElementById('cart-section');
        if (cartEl) cartEl.scrollIntoView({ behavior: 'smooth' });
      };

      // Live Time Signal
      const [currentTime, setCurrentTime] = createSignal('');
      setInterval(() => {
        const d = new Date();
        setCurrentTime(d.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('th-TH'));
      }, 1000);

      // Render SPA with 3 Strict Color Palette (Dark Navy, Sky Blue, White) & Regular Weight
      return html`
        <div class="flex-1 flex flex-col text-xl bg-slate-100 text-slate-900 min-h-screen font-normal">
          
          <!-- TOP HEADER BAR (DARK NAVY BACKGROUND & WHITE TEXT) -->
          <header class="bg-slate-900 border-b-4 border-sky-500 px-4 sm:px-6 py-3.5 shadow-lg flex flex-wrap items-center justify-between gap-4 sticky top-0 z-30 text-white">
            <div class="flex items-center gap-3.5">
              <span class="text-4xl sm:text-5xl bg-sky-600 p-2 rounded-2xl shadow">🏪</span>
              <div>
                <h1 class="font-normal text-2xl sm:text-3xl text-white leading-tight tracking-wide">
                  สุวรรณ การค้า
                </h1>
                <div class="flex items-center gap-3 text-sm sm:text-base text-slate-300 font-normal mt-0.5">
                  <span>📅 ${currentTime}</span>
                  ${() => lastFetchTime() ? html`
                    <span class="hidden sm:inline bg-slate-800 border border-slate-700 px-2.5 py-0.5 rounded-lg text-sky-400 font-normal">
                      🔄 API: ${lastFetchTime}
                    </span>
                  ` : ''}
                </div>
              </div>
            </div>

            <!-- CONTROLS -->
            <div class="flex items-center gap-2.5 flex-wrap">
              <button 
                onClick=${fetchProductsFromAPI}
                disabled=${loading}
                class="senior-btn px-4 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sky-400 rounded-2xl font-normal text-lg flex items-center gap-2 shadow-sm disabled:opacity-50"
              >
                <span class="text-2xl ${() => loading() ? 'animate-spin' : ''}">🔄</span>
                <span class="hidden sm:inline">รีเฟรช API</span>
              </button>

              <button 
                onClick=${() => {
                  const next = !soundEnabled();
                  setSoundEnabled(next);
                  playAudioTone('click');
                  if (next) speakThai('เปิดระบบเสียงอ่านภาษาไทยเรียบร้อยค่ะ');
                }}
                class="senior-btn px-4 py-2.5 rounded-2xl font-normal text-lg flex items-center gap-2 border ${() => soundEnabled() ? 'bg-sky-600 border-sky-500 text-white shadow-md' : 'bg-slate-800 border-slate-700 text-slate-400'}"
              >
                <span class="text-2xl">${() => soundEnabled() ? '🔊' : '🔇'}</span>
                <span class="hidden sm:inline">${() => soundEnabled() ? 'เสียงอ่าน: เปิด' : 'เสียงอ่าน: ปิด'}</span>
              </button>
            </div>
          </header>

          <!-- NAVIGATION TABS BAR (DARK NAVY + SKY BLUE ACCENT) -->
          <nav class="bg-slate-900 px-4 py-3 shadow-md flex items-center justify-center sm:justify-start gap-3 overflow-x-auto border-b-2 border-slate-800 sticky top-[75px] z-20 text-white">
            <button 
              onClick=${() => {
                setActiveTab('pos');
                playAudioTone('click');
              }}
              class="senior-btn px-6 py-3 rounded-2xl font-normal text-xl sm:text-2xl flex items-center gap-2.5 border-2 transition-all ${() => activeTab() === 'pos' ? 'bg-sky-600 text-white border-sky-400 shadow-lg scale-105' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-750 hover:text-white'}"
            >
              <span class="text-2xl">🛒</span>
              <span>หน้าร้าน (POS)</span>
            </button>

            <button 
              onClick=${() => {
                setActiveTab('dashboard');
                playAudioTone('click');
              }}
              class="senior-btn px-6 py-3 rounded-2xl font-normal text-xl sm:text-2xl flex items-center gap-2.5 border-2 transition-all ${() => activeTab() === 'dashboard' ? 'bg-sky-600 text-white border-sky-400 shadow-lg scale-105' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-750 hover:text-white'}"
            >
              <span class="text-2xl">📊</span>
              <span>รายงานยอดขาย (Dashboard)</span>
            </button>

            <button 
              onClick=${() => {
                setActiveTab('closure');
                playAudioTone('click');
              }}
              class="senior-btn px-6 py-3 rounded-2xl font-normal text-xl sm:text-2xl flex items-center gap-2.5 border-2 transition-all ${() => activeTab() === 'closure' ? 'bg-sky-600 text-white border-sky-400 shadow-lg scale-105' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-750 hover:text-white'}"
            >
              <span class="text-2xl">🔔</span>
              <span>สรุปปิดยอดประจำวัน</span>
            </button>
          </nav>

          ${() => apiError() ? html`
            <div class="bg-sky-100 border-b-2 border-sky-400 text-sky-950 px-4 py-2 text-center text-lg font-normal flex items-center justify-center gap-2">
              <span>⚠️ ${apiError}</span>
              <button onClick=${fetchProductsFromAPI} class="underline hover:text-sky-800 font-medium ml-2">ลองใหม่อีกครั้ง</button>
            </div>
          ` : ''}

          <!-- TAB 1: MAIN POS WORKSPACE (FULLY RESPONSIVE: MOBILE 1 COL, TABLET/DESKTOP 2 COLS) -->
          ${() => activeTab() === 'pos' ? html`
            <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-5 p-3 sm:p-5 max-w-[1920px] mx-auto w-full pb-24 lg:pb-5">
              
              <!-- LEFT PANEL: BARCODE & PRODUCT CATALOG (7 COLS ON DESKTOP/LAPTOP) -->
              <div class="lg:col-span-7 xl:col-span-7 flex flex-col gap-4">
                
                <!-- BARCODE & SEARCH CARD -->
                <div class="bg-white p-4 sm:p-5 rounded-[24px] border-2 border-slate-300 shadow-sm flex flex-col gap-4">
                  <div class="flex flex-wrap items-center justify-between gap-2">
                    <label for="barcode-input" class="font-normal text-slate-900 text-xl sm:text-2xl flex items-center gap-2">
                      <span>🔍 ค้นหา / ยิงบาร์โค้ด:</span>
                    </label>

                    <button 
                      onClick=${openCameraScanner}
                      class="senior-btn px-5 py-2.5 bg-sky-600 hover:bg-sky-700 text-white font-normal rounded-2xl text-lg sm:text-xl border border-sky-500 shadow-sm flex items-center gap-2"
                    >
                      <span class="text-2xl">📷</span>
                      <span>สแกนด้วยกล้องมือถือ</span>
                    </button>
                  </div>

                  <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl">⌨️</span>
                    <input 
                      id="barcode-input"
                      type="text"
                      autofocus
                      placeholder="ยิงบาร์โค้ด USB/BT หรือ พิมพ์ชื่อสินค้า..."
                      value=${searchQuery}
                      onInput=${(e) => setSearchQuery(e.target.value)}
                      onKeyDown=${(e) => {
                        if (e.key === 'Enter') {
                          e.preventDefault();
                          handleBarcodeSubmit(e.target.value);
                        }
                      }}
                      class="w-full pl-13 pr-16 py-3.5 bg-slate-50 border-2 border-sky-400 rounded-2xl text-slate-900 placeholder-slate-400 font-normal text-xl sm:text-2xl focus:ring-4 focus:ring-sky-200 focus:bg-white focus:outline-none shadow-inner"
                    />
                    ${() => searchQuery() ? html`
                      <button 
                        onClick=${() => {
                          setSearchQuery('');
                          const el = document.getElementById('barcode-input');
                          if (el) { el.value = ''; el.focus(); }
                        }}
                        class="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-200 hover:bg-slate-300 text-slate-900 px-3.5 py-1.5 rounded-xl font-normal text-base"
                      >
                        ✕ ล้าง
                      </button>
                    ` : ''}
                  </div>

                  <div class="flex items-center gap-2 overflow-x-auto pb-1">
                    ${() => categoriesList().map(cat => html`
                      <button 
                        onClick=${() => {
                          setSelectedCategory(cat);
                          playAudioTone('click');
                        }}
                        class="senior-btn whitespace-nowrap px-4 py-2.5 rounded-2xl font-normal flex items-center gap-2 text-lg border shadow-sm ${() => selectedCategory() === cat ? 'bg-sky-600 border-sky-700 text-white shadow-md' : 'bg-slate-100 border-slate-300 text-slate-800 hover:bg-slate-200'}"
                      >
                        <span class="text-xl">${getCategoryEmoji(cat)}</span>
                        <span>${cat}</span>
                      </button>
                    `)}
                  </div>
                </div>

                <!-- PRODUCT CARDS GRID (RESPONSIVE: 1 COL MOBILE, 2 COLS TABLET/DESKTOP) -->
                <div class="flex-1 bg-white p-4 sm:p-5 rounded-[24px] border-2 border-slate-300 shadow-sm overflow-y-auto max-h-[660px]">
                  ${() => filteredProducts().length === 0 ? html`
                    <div class="h-64 flex flex-col items-center justify-center text-slate-400 gap-2">
                      <span class="text-6xl">📦</span>
                      <span class="text-2xl font-normal text-slate-600">ไม่พบสินค้าที่คุณต้องการ</span>
                    </div>
                  ` : html`
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-4.5">
                      ${() => filteredProducts().map(product => {
                        const cartItem = cart().find(ci => ci.productID === product.productID);
                        const qtyInCart = cartItem ? cartItem.qty : 0;
                        const remainingStock = product.stock - qtyInCart;
                        const isOutOfStock = remainingStock <= 0;

                        const { mainName, sizeSpec } = formatProductName(product.productName);

                        return html`
                          <div 
                            onClick=${() => !isOutOfStock && addToCart(product)}
                            class="senior-card cursor-pointer bg-white border-2 border-slate-200 hover:border-sky-500 p-4 sm:p-5 shadow-sm hover:shadow-xl transition-all flex flex-col justify-between group overflow-hidden ${isOutOfStock ? 'opacity-40 cursor-not-allowed' : ''}"
                          >
                            <!-- 1. Product Image -->
                            <div class="relative w-full aspect-[4/3] mb-3 bg-slate-50 rounded-2xl overflow-hidden flex items-center justify-center border border-slate-200 shadow-inner">
                              <img 
                                src="${getProductImage(product)}" 
                                alt="${product.productName}"
                                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                onError=${(e) => { e.target.style.display = 'none'; }}
                              />
                              <span class="absolute top-2.5 left-2.5 bg-white/95 backdrop-blur-sm text-slate-900 border border-slate-300 px-3 py-1 rounded-xl text-xs sm:text-sm font-normal shadow-sm">
                                ${getCategoryEmoji(product.category)} ${product.category}
                              </span>
                            </div>

                            <!-- 2. Product Name (Regular Weight for Clean Airy Look) -->
                            <h3 class="font-normal text-slate-900 text-xl sm:text-2xl leading-snug mb-1 group-hover:text-sky-600 transition-colors">
                              ${mainName}
                            </h3>

                            <!-- 3. Size Spec & Stock -->
                            <div class="flex flex-wrap items-center gap-2 my-2">
                              ${sizeSpec ? html`
                                <span class="bg-slate-100 text-slate-800 font-normal border border-slate-300 px-3 py-0.5 rounded-xl text-sm sm:text-base">
                                  📏 ${sizeSpec}
                                </span>
                              ` : ''}
                              <span class="font-normal px-3 py-0.5 rounded-xl text-sm sm:text-base border ${remainingStock > 3 ? 'bg-sky-50 text-sky-900 border-sky-200' : remainingStock > 0 ? 'bg-slate-100 text-slate-900 border-slate-300' : 'bg-slate-200 text-slate-600 border-slate-400'}">
                                ${isOutOfStock ? '❌ สต็อคหมด' : `คงเหลือ: ${remainingStock} ชิ้น`}
                              </span>
                            </div>

                            <!-- 4. Price & Click Hint -->
                            <div class="pt-3 border-t border-slate-100 flex items-center justify-between mt-auto">
                              <div>

    // 6. Safe Initialization & Mounting
    function mountApp() {
      try {
        const root = document.getElementById('app');
        if (root) {
          root.innerHTML = '';
          root.appendChild(POSApp());
          if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
          }
        }
      } catch (err) {
        console.error('Mount Error:', err);
        const root = document.getElementById('app');
        if (root) {
          root.innerHTML = '<div style="color:red; font-size:24px; padding:40px; text-align:center;">เกิดข้อผิดพลาดในการโหลดระบบ: ' + err.message + '</div>';
        }
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', mountApp);
    } else {
      mountApp();
    }
